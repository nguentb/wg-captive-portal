      height: 0;

      border-right: 31px solid transparent;

    .warning::after {
      content: "!";
      position: absolute;
      left: 0;

      bottom: 7px;
      color: #142033;
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
    }

    h1 {

      color: var(--danger);

      line-height: 1.18;
      letter-spacing: 0;
      font-weight: 800;
    }

    .lead {
      margin: 0;
      color: var(--text);
      font-size: 21px;
      line-height: 1.45;
    }

    .contact-card {
      margin-top: 22px;
      padding: 34px 20px 20px;
      border-radius: 16px;
      background: var(--inner);
    }

    .contact-label {
      margin: 0 0 12px;
      color: var(--text);
      font-size: 21px;
      line-height: 1.35;
    }

    .phone-number {
      display: block;
      margin-bottom: 22px;
      color: var(--green);
      font-size: 32px;
      line-height: 1.15;
      font-weight: 800;
      text-decoration: none;
    }

    .actions {
      display: grid;
      gap: 14px;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 62px;
      padding: 14px 18px;
      border-radius: 13px;
      color: #ffffff;
      font-size: 20px;
      font-weight: 800;
      text-decoration: none;
    }

    .button .icon {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      font-size: 13px;
      line-height: 1;
      font-weight: 900;
    }

    .button.call {

    }

    .button.whatsapp {

    }

    .button.zalo {

    .note {

      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    footer {

      color: #7486a5;
      font-size: 16px;
      line-height: 1.4;
    }

    }

    @media (max-width: 520px) {

      }

        height: 48px;

        border-right-width: 27px;
        border-bottom-width: 48px;
      }

        font-size: 30px;
      }

      }

      }

      .phone-number {

      }

      .button {

      }
    }
  </style>
</head>

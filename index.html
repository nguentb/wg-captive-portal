<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VPN het han</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f5f6f8;
      color: #111827;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(460px, 100%);
      padding: 30px 26px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      text-align: center;
      box-shadow: 0 14px 42px rgba(17, 24, 39, 0.08);
    }

    .icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fee2e2;
      color: #b91c1c;
      font-size: 34px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #4b5563;
      font-size: 16px;
      line-height: 1.55;
    }

    .contact {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid #eef0f3;
      color: #111827;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <div class="icon">!</div>
    <h1>Ket noi VPN cua ban da het han.</h1>
    <p>Vui long gia han de tiep tuc su dung Internet.</p>
    <p class="contact">Lien he nha cung cap dich vu de duoc ho tro.</p>
  </main>
</body>
</html>
